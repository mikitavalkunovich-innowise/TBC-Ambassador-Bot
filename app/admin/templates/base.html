<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TBC Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; flex-shrink: 0; }
    .sidebar .nav-link { color: #adb5bd; padding: .5rem 1.25rem; border-radius: 0; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
    .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 1.25rem; border-bottom: 1px solid rgba(255,255,255,.1); }
    .main-content { flex: 1; overflow-y: auto; }
    .stat-card { border-left: 4px solid; }
    .stat-card.primary { border-color: #0d6efd; }
    .stat-card.success { border-color: #198754; }
    .stat-card.warning { border-color: #ffc107; }
    .stat-card.danger  { border-color: #dc3545; }
    .badge-pending  { background: #ffc107; color: #000; }
    .badge-approved { background: #198754; color: #fff; }
    .badge-rejected { background: #dc3545; color: #fff; }
  </style>
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column">
    <div class="brand">
      <i class="bi bi-robot me-2"></i>TBC Admin
    </div>
    <ul class="nav flex-column mt-2">
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/admin/">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'moderation' %}active{% endif %}" href="/admin/moderation">
          <i class="bi bi-check2-circle me-2"></i>Moderation
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="/admin/settings">
          <i class="bi bi-gear me-2"></i>Settings
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'promo' %}active{% endif %}" href="/admin/promo">
          <i class="bi bi-megaphone me-2"></i>Promo
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'debug' %}active{% endif %}" href="/admin/debug">
          <i class="bi bi-lightning me-2"></i>Debug
        </a>
      </li>
    </ul>
    <div class="mt-auto p-3">
      <a href="/admin/logout" class="btn btn-outline-secondary btn-sm w-100">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <div class="main-content p-4">
    {% if saved %}
    <div class="alert alert-success alert-dismissible fade show py-2" role="alert">
      <i class="bi bi-check-circle me-1"></i>Settings saved successfully.
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
