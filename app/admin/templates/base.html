<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TBC Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: #1a1a2e;
      flex-shrink: 0;
      --bs-offcanvas-bg: #1a1a2e;
      --bs-offcanvas-color: #fff;
      --bs-offcanvas-border-color: rgba(255, 255, 255, .1);
    }
    @media (min-width: 992px) {
      /* offcanvas-lg resets bg to transparent on desktop — restore sidebar color */
      .sidebar.offcanvas-lg {
        background-color: #1a1a2e !important;
      }
    }
    .sidebar .nav-link { color: #adb5bd; padding: .5rem 1.25rem; border-radius: 0; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
    .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 1.25rem; border-bottom: 1px solid rgba(255,255,255,.1); }
    .main-content { flex: 1; overflow-y: auto; min-width: 0; }
    .admin-mobile-bar { background: #1a1a2e; z-index: 1030; }
    .stat-card { border-left: 4px solid; }
    .stat-card.primary { border-color: #0d6efd; }
    .stat-card.success { border-color: #198754; }
    .stat-card.warning { border-color: #ffc107; }
    .stat-card.danger  { border-color: #dc3545; }
    .badge-pending  { background: #ffc107; color: #000; }
    .badge-approved { background: #198754; color: #fff; }
    .badge-rejected { background: #dc3545; color: #fff; }
  </style>
</head>
<body>
<div class="d-flex w-100">
  <!-- Sidebar (offcanvas on mobile, always visible on lg+) -->
  <nav class="offcanvas-lg offcanvas-start sidebar d-flex flex-column"
       tabindex="-1" id="adminSidebar" aria-labelledby="adminSidebarLabel">
    <div class="offcanvas-header d-lg-none border-bottom border-secondary">
      <h5 class="offcanvas-title text-white" id="adminSidebarLabel">
        <i class="bi bi-robot me-2"></i>TBC Admin
      </h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
              data-bs-target="#adminSidebar" aria-label="Close menu"></button>
    </div>
    <div class="brand d-none d-lg-block">
      <i class="bi bi-robot me-2"></i>TBC Admin
    </div>
    <ul class="nav flex-column mt-2">
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/admin/"
           data-bs-dismiss="offcanvas">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'moderation' %}active{% endif %}" href="/admin/moderation"
           data-bs-dismiss="offcanvas">
          <i class="bi bi-check2-circle me-2"></i>Moderation
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="/admin/settings"
           data-bs-dismiss="offcanvas">
          <i class="bi bi-gear me-2"></i>Settings
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'promo' %}active{% endif %}" href="/admin/promo"
           data-bs-dismiss="offcanvas">
          <i class="bi bi-megaphone me-2"></i>Promo
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'debug' %}active{% endif %}" href="/admin/debug"
           data-bs-dismiss="offcanvas">
          <i class="bi bi-lightning me-2"></i>Debug
        </a>
      </li>
    </ul>
    <div class="mt-auto p-3">
      <a href="/admin/logout" class="btn btn-outline-secondary btn-sm w-100" data-bs-dismiss="offcanvas">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <div class="main-content d-flex flex-column min-vh-100">
    <div class="admin-mobile-bar d-lg-none sticky-top d-flex align-items-center gap-3 px-3 py-2">
      <button class="btn btn-link text-white text-decoration-none p-0 lh-1" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#adminSidebar" aria-controls="adminSidebar"
              aria-label="Open menu">
        <i class="bi bi-list fs-3"></i>
      </button>
      <span class="text-white fw-semibold">TBC Admin</span>
    </div>
    <div class="p-4 flex-grow-1">
    {% if saved %}
    <div class="alert alert-success alert-dismissible fade show py-2" role="alert">
      <i class="bi bi-check-circle me-1"></i>Settings saved successfully.
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
