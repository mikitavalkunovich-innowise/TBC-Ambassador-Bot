<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TBC Admin — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 380px; width: 100%; }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center">
  <div class="login-card">
    <div class="card shadow-lg border-0">
      <div class="card-body p-4">
        <h4 class="mb-1 fw-bold text-center">TBC Ambassador</h4>
        <p class="text-muted text-center small mb-4">Admin Panel</p>

        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" autofocus autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
